spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vibeshop?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

jwt:
  secret: vibeshop-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-expiration: 3600000      # 1시간
  refresh-expiration: 604800000   # 7일

cors:
  allowed-origins: http://localhost:3000

logging:
  level:
    com.vibeshop: DEBUG
    org.springframework.security: DEBUG
